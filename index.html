<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Great Life 786</title>
</head>
<body>

    <!-- سائن اپ فارم -->
    <div id="signup-form">
        <h2>Sign Up</h2>
        <input type="email" id="up-email" placeholder="Email Address (Required)">
        <input type="password" id="up-pass" placeholder="Password (Required)">
        <!-- یہاں نیا ڈبہ شامل کر دیا ہے -->
        <input type="password" id="up-confirm-pass" placeholder="Confirm Password (Required)">
        <input type="text" id="up-phone" placeholder="Mobile Number (Required)">
        <button onclick="handleSignup()">Sign Up</button>
    </div>

    <!-- سائن ان فارم -->
    <div id="signin-form" class="hidden">
        <h2>Sign In</h2>
        <input type="email" id="in-email" placeholder="Email Address">
        <input type="password" id="in-pass" placeholder="Password">
        <button onclick="handleSignin()">Sign In</button>
    </div>

    <!-- اسکرپٹ اور فائر بیس کا حصہ -->
    <script>
        function handleSignup() {
            const pass = document.getElementById('up-pass').value;
            const confirmPass = document.getElementById('up-confirm-pass').value;
            if (pass !== confirmPass) { alert("Passwords do not match!"); return; }
            // باقی لاجک
            alert("Account created!");
        }

        function handleSignin() {
            window.location.href = 'dashboard.html';
        }
    </script>

            measurementId: "G-VP0CZLP99E"
        };
        initializeApp(firebaseConfig);
    </script>

</body>
</html>
