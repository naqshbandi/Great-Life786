<!DOCTYPE html>
<html lang="en">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Life786 - Auth</title>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff66; padding: 25px; border-radius: 15px; width: 320px; text-align: center; background: #111; }
        h2 { color: #00ff66; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #00ff66; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        .pass-wrapper { position: relative; }
        .toggle-pass { position: absolute; right: 10px; top: 35%; cursor: pointer; color: #00ff66; font-size: 12px; }
        button { width: 100%; padding: 12px; background: #00ff66; border: 2px solid #fff; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; }
        .switch { margin-top: 15px; font-size: 14px; cursor: pointer; color: #00ff66; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="auth-box">
    <!-- Sign Up Form -->
    <div id="signup-form">
        <h2>Sign Up</h2>
        <input type="email" id="up-email" placeholder="Email Address (Required)" required>
        <div class="pass-wrapper">
            <input type="password" id="up-pass" placeholder="Password" required>
            <span class="toggle-pass" onclick="togglePass('up-pass')">Show</span>
        </div>
        <div class="pass-wrapper">
            <input type="password" id="up-cpass" placeholder="Confirm Password" required>
        </div>
        <div style="display: flex; gap: 5px; align-items: center;">
            <select id="country-code">
                <option value="+92">+92 (PK)</option> <option value="+91">+91 (IN)</option> <option value="+60">+60 (MY)</option>
                <option value="+62">+62 (ID)</option> <option value="+93">+93 (AF)</option> <option value="+880">+880 (BD)</option>
                <option value="+90">+90 (TR)</option> <option value="+971">+971 (UAE)</option> <option value="+966">+966 (SA)</option>
                <option value="+44">+44 (UK)</option> <option value="+1">+1 (US)</option> <option value="+49">+49 (DE)</option>
                <option value="+33">+33 (FR)</option> <option value="+81">+81 (JP)</option> <option value="+61">+61 (AU)</option>
            </select>
            <input type="tel" id="up-phone" placeholder="Mobile Number (Required)" required>
        </div>
        <button onclick="handleSignup()">Sign Up</button>
        <p class="switch" onclick="switchForm()">Already have an account? Sign In</p>
    </div>

    <!-- Sign In Form -->
    <div id="signin-form" class="hidden">
        <h2>Sign In</h2>
        <input type="email" id="in-email" placeholder="Email Address" required>
        <input type="password" id="in-pass" placeholder="Password" required>
        <button onclick="handleSignin()">Sign In</button>
        <p class="switch" onclick="switchForm()">Don't have an account? Sign Up</p>
    </div>
</div>

<script>
    function togglePass(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function switchForm() {
        document.getElementById('signup-form').classList.toggle('hidden');
        document.getElementById('signin-form').classList.toggle('hidden');
    }

    function handleSignup() {
        const email = document.getElementById('up-email').value;
        const pass = document.getElementById('up-pass').value;
        const cpass = document.getElementById('up-cpass').value;
        
        if (pass !== cpass) {
            alert("Passwords do not match!");
            return;
        }
        alert("Account created successfully!");
        switchForm();
    }

    function handleSignin() {
        window.location.href = 'Dashboard.html';
    }
</script>

</body>
</html>
