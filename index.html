<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Life 786 AI Suite</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; opacity: 0.5; }

        .lang-select { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .lang-select select { padding: 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid white; cursor: pointer; }

        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; text-align: center; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }

        h1 { font-size: 3rem; margin-bottom: 20px; color: #fff; }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 80%; max-width: 800px; }

        button { padding: 15px; border: none; border-radius: 10px; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.3); cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background: rgba(0, 123, 255, 0.7); border-color: white; transform: scale(1.05); }

        input, textarea { width: 80%; max-width: 800px; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255, 255, 255, 0.2); color: white; }
    </style>
</head>
<body>

    <video autoplay muted loop class="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="lang-select">
        <select id="lang" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="ur">اردو</option>
        </select>
    </div>

    <div class="container">
        <h1 id="title">Great Life 786 AI Studio</h1>
        
        <input type="text" id="projectInput" placeholder="Enter Project Name...">
        <textarea id="contentInput" rows="3" placeholder="Describe your prompt here..."></textarea>

        <div class="controls" id="buttons">
            <button onclick="runTask('Text-to-Image')">Text to Image</button>
            <button onclick="runTask('Image-to-Video')">Image to Video</button>
            <button onclick="runTask('AI-Video-Gen')">AI Video Gen</button>
            <button onclick="runTask('Text-to-Text')">Text to Text</button>
            <button onclick="runTask('Audio-Gen')">Audio Generation</button>
            <button onclick="runTask('Edit-Video')">Video Editing</button>
        </div>
    </div>

    <script>
        function changeLanguage() {
            const lang = document.getElementById('lang').value;
            if (lang === 'ur') {
                document.getElementById('title').innerText = 'Great Life 786 اے آئی اسٹوڈیو';
                document.getElementById('projectInput').placeholder = 'پروجیکٹ کا نام لکھیں...';
                document.getElementById('contentInput').placeholder = 'اپنا پرامپٹ یہاں لکھیں...';
            } else {
                document.getElementById('title').innerText = 'Great Life 786 AI Studio';
                document.getElementById('projectInput').placeholder = 'Enter Project Name...';
                document.getElementById('contentInput').placeholder = 'Describe your prompt here...';
            }
        }

        async function runTask(taskType) {
            alert('Starting ' + taskType + ' for Great Life 786');
        }
    </script>
</body>
</html>ss
