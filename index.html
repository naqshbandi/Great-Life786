<!DOCTYPE html>

<body>

    <!-- آپ کے فارمز یہاں رہیں گے -->
    <div id="signup-form">
        <h2>Sign Up</h2>
        <!-- آپ کے باقی ان پٹ فیلڈز -->
    </div>

    <div id="signin-form" class="hidden">
        <h2>Sign In</h2>
        <!-- آپ کے سائن ان کے فیلڈز -->
    </div>

    <!-- پہلے وہ سکرپٹ جس میں آپ کے فنکشنز ہیں -->
    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function switchForm() {
            document.getElementById('signup-form').classList.toggle('hidden');
            document.getElementById('signin-form').classList.toggle('hidden');
        }

        function handleSignup() {
            const email = document.getElementById('up-email').value;
            const phone = document.getElementById('up-phone').value;
            if (!email || !phone) { alert("Please fill in both Email and Mobile Number!"); return; }
            alert("Account created! Please check your email/SMS for verification code.");
            switchForm();
        }

        function handleSignin() {
            const email = document.getElementById('in-email').value;
            const pass = document.getElementById('in-pass').value;
            if (!email || !pass) { alert("Please fill in all fields!"); return; }
            alert("Signing in...");
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
