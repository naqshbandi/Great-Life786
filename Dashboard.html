<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #081221; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); width: 90%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 20px; font-size: 24px; }
        input, textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        button { background: rgba(255, 255, 255, 0.1); border: 1px solid #00ff66; color: white; padding: 12px; border-radius: 8px; cursor: pointer; }
        button:hover { background: #00ff66; }
        .submit-btn { width: 100%; margin-top: 15px; background: #00ff66; font-weight: bold; padding: 15px; border: none; border-radius: 8px; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Great Life786 AI Studio</h2>
        <input type="text" placeholder="Enter project name...">
        <textarea rows="3" placeholder="Enter your prompt here..."></textarea>
        <div class="grid">
            <button>Text Generation</button>
            <button>Image Generation</button>
            <button>AI Video</button>
            <button>Text-Speech</button>
            <button>Audio Edit</button>
            <button>Edit Project</button>
        </div>
        <button class="submit-btn">Submit Request</button>
    </div>
    
    <div id="loader" style="display: none; margin-top: 20px; text-align: center; color: #00ff66;">
    <p>Processing...</p>
</div>

<div id="result-display" style="margin-top: 30px; padding: 20px; background: rgba(255, 255, 255, 0.1); border-radius: 15px; border: 1px solid #00ff66; color: white; display: none;">
    <h3 id="result-title" style="text-align: center;">Result</h3>
    <div id="media-container" style="text-align: center; margin-bottom: 20px;">
        <img id="output-image" src="" style="max-width: 100%; display: none; border-radius: 10px;">
        <video id="output-video" controls style="max-width: 100%; display: none;"></video>
    </div>
    <div id="text-container" style="line-height: 1.6; font-size: 18px; text-align: justify;"></div>
</div>


    <script>
        let tool = "";
        document.querySelectorAll('.grid button').forEach(button => {
            button.onclick = function() {
                document.querySelectorAll('.grid button').forEach(btn => btn.style.background = 'rgba(255, 255, 255, 0.1)');
                this.style.background = '#00ff66';
                tool = this.innerText;
            };
        });


    document.querySelector('.submit-btn').onclick = async function() {
        const prompt = document.querySelector('textarea').value;
        const btn = document.querySelector('.submit-btn');
        const resultDisplay = document.getElementById('result-display');
        const loader = document.getElementById('loader');
        const img = document.getElementById('output-image');
        const video = document.getElementById('output-video');
        const textContainer = document.getElementById('text-container');

        btn.disabled = true;
        btn.innerText = "Processing...";
        loader.style.display = "block";
        resultDisplay.style.display = "none";
        img.style.display = "none";
        video.style.display = "none";
        textContainer.innerText = "";

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await res.json();
            
            loader.style.display = "none";
            btn.disabled = false;
            btn.innerText = "Submit Request";
            resultDisplay.style.display = "block";

            if (data.output) {
                if (typeof data.output === 'string' && data.output.includes('.mp4')) {
                    video.src = data.output;
                    video.style.display = "block";
                } else if (typeof data.output === 'string' && (data.output.includes('.jpg') || data.output.includes('.png'))) {
                    img.src = data.output;
                    img.style.display = "block";
                } else {
                    textContainer.innerText = data.output;
                }
            } else {
                textContainer.innerText = "Error: No output received.";
            }
        } catch (e) {
            loader.style.display = "none";
            btn.disabled = false;
            btn.innerText = "Submit Request";
            alert("Server error: " + e.message);
        }
    };

        

        
    </script>
